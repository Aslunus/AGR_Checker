<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AGR Checker</title>
  <style>
    :root{--bg:#09101b;--panel:#111c2c;--panel2:#18263a;--line:#2a3a50;--text:#f4f7fb;--muted:#9caabd;--green:#59dbae;--blue:#4f9eff;--red:#ff6870;--yellow:#ffc650}
    *{box-sizing:border-box} body{margin:0;min-height:100vh;background:radial-gradient(circle at 10% 0,#16283d 0,transparent 34%),var(--bg);color:var(--text);font-family:Inter,Segoe UI,Arial,sans-serif}
    button,a{font:inherit}.shell{width:min(1120px,calc(100% - 40px));margin:0 auto;padding:34px 0}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .brand,.badge{display:inline-flex;align-items:center;gap:9px;border:1px solid var(--line);background:#111b29;border-radius:999px;padding:9px 14px;font-size:13px;font-weight:700}.dot{width:9px;height:9px;border-radius:50%;background:var(--green)}
    .doc{color:var(--muted);text-decoration:none;font-size:14px}.doc:hover{color:var(--text)}.card{min-height:680px;border:1px solid var(--line);border-radius:28px;background:linear-gradient(145deg,rgba(24,38,58,.96),rgba(12,21,34,.98));box-shadow:0 28px 80px #0008;padding:46px;display:flex;flex-direction:column}
    h1{font-size:48px;line-height:1.08;max-width:760px;margin:22px 0 16px;letter-spacing:-1.8px}h2{font-size:36px;line-height:1.14;margin:10px 0 14px;letter-spacing:-1px}.lead{font-size:18px;line-height:1.6;color:var(--muted);max-width:790px;margin:0 0 30px}.eyebrow{color:var(--green);font-weight:800;font-size:12px;letter-spacing:1.5px;text-transform:uppercase}
    .choices{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:12px}.choice{display:flex;flex-direction:column;min-height:270px;padding:26px;border:1px solid var(--line);border-radius:20px;background:#101b2a}.choice h3{font-size:23px;margin:18px 0 10px}.choice p{color:var(--muted);line-height:1.55;margin:0 0 24px}.choice button{margin-top:auto}
    .mode{width:max-content;padding:7px 11px;border-radius:999px;font-size:13px;font-weight:800;background:#0e352b;color:var(--green)}.mode.vpm{background:#112d50;color:var(--blue)}
    .progress-row{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:13px}.track{height:7px;background:#203047;border-radius:99px;overflow:hidden;margin:14px 0 28px}.fill{height:100%;background:var(--green);transition:width .25s ease}.fill.vpm{background:var(--blue)}
    .checks{display:grid;gap:11px;padding:19px 20px;border:1px solid var(--line);border-radius:16px;background:#0f1a29;margin:12px 0 18px}.check{display:flex;gap:12px;line-height:1.45}.check:before{content:"";width:8px;height:8px;flex:0 0 8px;border-radius:50%;background:var(--green);margin-top:7px}.vpm-check .check:before{background:var(--blue)}
    .note{display:flex;gap:12px;padding:14px 16px;border-radius:13px;background:#0d3028;color:#dffaf1;font-size:14px;line-height:1.45}.note.vpm{background:#102a49;color:#e3f0ff}.note strong{color:var(--green)}.note.vpm strong{color:var(--blue)}
    .actions{display:flex;justify-content:space-between;gap:12px;margin-top:auto;padding-top:26px}.right{display:flex;gap:12px}.btn{border:1px solid var(--line);border-radius:12px;padding:14px 20px;background:#19273a;color:var(--text);font-weight:750;cursor:pointer;transition:.15s}.btn:hover{transform:translateY(-1px);filter:brightness(1.12)}.primary{background:var(--green);border-color:var(--green);color:#071711}.primary.vpm{background:var(--blue);border-color:var(--blue);color:#061322}.danger{background:#351419;border-color:#793039;color:#ff8b91}.ghost{background:transparent}
    .center{align-items:center;justify-content:center;text-align:center}.status{width:92px;height:92px;display:grid;place-items:center;border-radius:50%;background:#113a30;color:var(--green);font-size:48px;font-weight:900;margin-bottom:16px}.status.bad{background:#3b171c;color:var(--red)}.summary{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin:18px 0 30px}.pill{padding:8px 12px;border-radius:999px;background:#103329;color:var(--green);font-size:13px;font-weight:700}
    .source{color:var(--muted);font-size:13px;line-height:1.5;padding-top:20px}@media(max-width:760px){.shell{width:min(100% - 22px,1120px);padding:14px 0}.card{padding:24px;min-height:calc(100vh - 90px)}h1{font-size:36px}.choices{grid-template-columns:1fr}.actions{flex-direction:column}.right{display:grid}.btn{width:100%}.top{align-items:flex-start;gap:12px}.doc{text-align:right}}
  </style>
</head>
<body>
  <main class="shell">
    <header class="top"><div class="brand"><span class="dot"></span>AGR CHECKER</div><span class="doc">Упрощённый контроль АГР</span></header>
    <section id="app" class="card"></section>
  </main>
  <script>
    const flows={
      npm:{label:'НПМ',name:'Низкополигональная модель',steps:[
        ['Комплект','Подготовлен корректный архив НПМ?','Проверьте формат и состав перед технической проверкой.',['ZIP не более 1 ГБ, без битых и нечитаемых файлов.','Внутри 2–21 FBX: благоустройство и до 20 моделей ОКС.','FBX 7.4 / FBX 2014 Binary.','Нет камер, анимаций, костей, звуков, людей, транспорта и лишних объектов.'],'Файл благоустройства обязателен.'],
        ['Геометрия','Геометрия очищена и оптимизирована?','Проверяем структуру объектов и техническую чистоту.',['ОКС, секции, корпуса и стилобаты разделены на самостоятельные объекты.','До 150 000 треугольников на FBX ОКС; благоустройство суммарно до 180 000.','Нет изолированных и нулевых элементов; дубликаты в пределах допуска.','Нормали направлены наружу, геометрия триангулирована, трансформации применены.'],'Периметр благоустройства выдавлен вниз минимум на 1 метр.'],
        ['Материалы','Материалы соответствуют допустимой схеме?','Без сторонних рендер-движков и лишних материалов.',['Standard (Legacy), Physical Material или Principled BSDF.','Количество материалов соответствует количеству текстурных наборов.','Для полупрозрачных деталей не более 7 материалов и нет текстур.','Прозрачность стекла задана параметрами материала и составляет 50%.'],'V-Ray, Corona, Octane и Arnold запрещены.'],
        ['Текстуры и UV','Текстуры и UV-развёртка готовы?','Проверяем атласы, размеры и обязательные карты.',['PNG встроены в FBX; размеры 256, 512, 1024 или 2048 px.','Карта весит не более 3 МБ, альфа-канал не используется.','Diffuse обязательна; Normal, Transparency, Roughness и Metallic — по необходимости.','Roughness и Metallic используются парой; padding уникальных островов от 8 px.'],'Для полигональных элементов благоустройства один набор до 512×512 px.'],
        ['Именование','Файлы и объекты названы по шаблону?','Адрес, суффиксы и нумерация читаются однозначно.',['Только латиница, цифры и нижнее подчёркивание.','Address сформирован по адресу или кадастровому номеру.','Суффиксы Mat, Glass, Ground, GroundEl и Flora применены по назначению.','Нумерация 001…020 последовательна, без пропусков и повторов.'],'Полное имя не превышает 254 символа.'],
        ['Размещение','Точка отсчёта и поворот проверены?','Модель должна совпадать с проектным положением.',['1 условная единица сцены = 1 метр.','Точки отсчёта объектов согласованы.','Углы поворота сброшены или соответствуют проекту.','Нет пропавших полигонов и конфликтующих поверхностей.'],'Зазор между сонаправленными полигонами — от 5 мм до 2 см.'],
        ['Финальный контроль','Архив открывается и выглядит корректно?','Последняя ручная проверка перед передачей.',['Все FBX открываются без ошибок и сохраняют материалы.','Нет временных, резервных и дублирующих файлов.','Благоустройство, растительность и МАФ присутствуют.','Модель осмотрена снаружи и через светопрозрачные элементы.'],'При сомнении сверяйтесь с полным регламентом.']
      ]},
      vpm:{label:'ВПМ',name:'Высокополигональная модель',steps:[
        ['Комплект','Архивы ВПМ собраны правильно?','ОКС и благоустройство передаются отдельными комплектами.',['ZIP ОКС до 500 МБ; ZIP благоустройства до 1 ГБ.','Есть FBX, GeoJSON и 3–2100 PNG; при наличии — FBX освещения.','Каждый отдельностоящий ОКС и стилобат сформирован отдельной моделью.','Благоустройство с элементами и растительностью передано отдельно.'],'Текстуры во ВПМ не встраиваются в FBX.'],
        ['Метаданные','GeoJSON заполнен по схеме?','Проверяем синтаксис, поля и координаты.',['FeatureCollection и кодировка UTF-8 корректны.','Имена полей не изменены и не продублированы.','Заполнены сведения об объекте, организациях и кадастровых номерах.','coordinates в МСК-77 с точностью 3 знака; отклонение до 0,5 м.'],'imageBase64 готовится из JPG 256×256; стекло описывается в Classes.'],
        ['Геометрия','Сцена и геометрия технически чистые?','Детализация не отменяет требований к структуре.',['Нет камер, пустых объектов, коммуникаций и лишней геометрии.','Нормали корректны, отверстия закрыты, нет нулевых элементов.','Сглаживание корректно, геометрия триангулирована, трансформации применены.','Лимит полигонов соответствует площади участка и типу модели.'],'Существующие нереконструируемые здания не моделируются.'],
        ['Материалы','Материалы настроены без запрещённых шейдеров?','Проверяем PBR-схему и соответствие текстурным наборам.',['Standard, Physical Material или Principled BSDF.','V-Ray, Corona, Octane и Arnold не применяются.','Количество материалов соответствует наборам текстур.','Параметры одинаково читаются после открытия FBX в другом редакторе.'],'Стеклянные материалы дополнительно описываются в GeoJSON.'],
        ['Текстуры и UV','Карты, UDIM и плотность текселей проверены?','Один из самых частых источников возврата модели.',['PNG лежат рядом с FBX; используются Diffuse, Normal и ERM.','UV фасадов и благоустройства организована через UDIM.','Текстурные заглушки имеют размер 256×256 px.','Плотность Diffuse — 512–1706 px/м, где требование применимо.'],'ERM: R — emissive, G — roughness, B — metallic.'],
        ['Именование','Имена файлов, геометрии и карт валидны?','Проверяем Address, тип объекта и сквозную нумерацию.',['Латиница и нижние подчёркивания, без пробелов.','Корректные префиксы SM, M, UCX и суффиксы Mat, Glass, Ground.','Нумерация последовательна и не обнуляется внутри комплекта.','Текстуры содержат тип карты и UDIM-номер.'],'Для света используются шаблоны Point и Spot.'],
        ['Размещение','Пивоты и плановое положение совпадают?','Объекты собираются в единой системе координат.',['Единицы измерения метрические.','Пивоты ОКС, благоустройства, коллизий и света согласованы.','Положение соответствует СПОЗУ и GeoJSON.','Ось Z и нулевая отметка проекта корректны.'],'Пивоты нельзя компенсировать случайными трансформациями.'],
        ['Коллизии','Коллизии и сквозные вырезы подготовлены?','Проверяем служебную геометрию.',['Коллизии выпуклые, замкнутые и без отверстий.','Имена начинаются с UCX и соответствуют основной модели.','До 50 000 полигонов модели — до 15 000 треугольников коллизии; далее до 5%.','Сквозные отверстия переданы чёрно-белой картой.'],'Коллизия входной группы имеет форму усечённой пирамиды.'],
        ['Освещение','Архитектурное освещение соответствует проекту?','Если светового дизайна нет, этап можно пропустить.',['Свечение — канал R карты ERM, цвет — через Diffuse.','В FBX не более 250 источников.','Только Point и конические Spot.','Минимальный шаг: Point 5 м, Spot 1,5 м; свет привязан к корню.'],'Настраиваются только цвет и сила; схема передаёт проектный рисунок.',true]
      ]}
    };
    const app=document.querySelector('#app');let mode=null,index=0,issueFrom=0;
    const btn=(label,cls,fn)=>`<button class="btn ${cls}" onclick="${fn}">${label}</button>`;
    function home(){mode=null;app.className='card';app.innerHTML=`<span class="badge"><span class="dot"></span>УПРОЩЁННАЯ ПРОВЕРКА ПО РЕГЛАМЕНТУ АГР</span><h1>Проверь модель до передачи</h1><p class="lead">Пошаговый чекер охватывает комплект файлов, геометрию, материалы, текстуры, именование, размещение и специальные требования.</p><div class="choices">${choice('npm','НПМ','Низкополигональная модель','Оптимизированная модель для городских информационных систем.')} ${choice('vpm','ВПМ','Высокополигональная модель','Детализированная модель с GeoJSON, внешними текстурами и коллизиями.')}</div><p class="source">Основа: «Новый приказ по ВПМ и НПМ», 58 страниц. Чекер намеренно упрощён и не заменяет полный технический контроль.</p>`}
    function choice(key,label,title,text){return `<article class="choice"><span class="mode ${key}">${label}</span><h3>${title}</h3><p>${text}</p>${btn('Начать проверку','primary '+(key==='vpm'?'vpm':''),`start('${key}')`)}</article>`}
    function start(key){mode=key;index=0;renderStep()}
    function renderStep(){const f=flows[mode],s=f.steps[index],pct=(index+1)/f.steps.length*100;app.className='card';app.innerHTML=`<div class="progress-row"><span class="mode ${mode}">${f.label}</span><span>Шаг ${index+1} из ${f.steps.length}</span></div><div class="track"><div class="fill ${mode}" style="width:${pct}%"></div></div><div class="eyebrow" style="color:${mode==='vpm'?'var(--blue)':'var(--green)'}">${s[0]}</div><h2>${s[1]}</h2><p class="lead">${s[2]}</p><div class="checks ${mode==='vpm'?'vpm-check':''}">${s[3].map(x=>`<div class="check">${x}</div>`).join('')}</div><div class="note ${mode==='vpm'?'vpm':''}"><strong>Важно</strong><span>${s[4]}</span></div><div class="actions">${btn('Назад','ghost','back()')}<div class="right">${btn('Нет, исправить','danger','showIssue()')}${s[5]?btn('Не применимо','', 'next()'):''}${btn('Да, продолжить','primary '+(mode==='vpm'?'vpm':''),'next()')}</div></div>`}
    function next(){if(index<flows[mode].steps.length-1){index++;renderStep()}else success()}
    function back(){if(index>0){index--;renderStep()}else home()}
    function showIssue(){issueFrom=index;app.className='card center';app.innerHTML=`<div class="status bad">!</div><h2>На этом этапе есть несоответствие</h2><p class="lead">Зафиксируйте замечание, исправьте модель и вернитесь к вопросу «${flows[mode].steps[issueFrom][1]}».</p>${btn('Вернуться к проверке','primary '+(mode==='vpm'?'vpm':''),'renderStep()')}`}
    function success(){const f=flows[mode];app.className='card center';app.innerHTML=`<div class="status">✓</div><span class="mode ${mode}">${f.label}</span><h2>${f.name} прошла упрощённую проверку</h2><p class="lead">Пройдено этапов: ${f.steps.length} из ${f.steps.length}. Перед отправкой сохраните контрольную копию и сверьте спорные пункты с полным регламентом.</p><div class="summary"><span class="pill">✓ Комплект</span><span class="pill">✓ Геометрия</span><span class="pill">✓ Материалы</span><span class="pill">✓ Именование</span></div>${btn('Проверить другую модель','primary','home()')}`}
    home();
  </script>
</body>
</html>
